<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Sports Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 2.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        .toggle-text span {
            color: #2563eb;
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand">Login To Portal</div>
        
        <div id="login-box">
            <h2>Log In to Your Account</h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="coach@team.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" id="login-btn">Log In</button>
            <div class="error-msg" id="login-error"></div>
            <p class="toggle-text">Need an account? <span id="to-signup">Sign Up</span></p>
        </div>

        <div id="signup-box" class="hidden">
            <h2>Create Athlete Profile</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Alex Morgan">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="player@field.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Minimum 6 characters">
            </div>
            <button class="btn" id="signup-btn">Create Account</button>
            <div class="error-msg" id="signup-error"></div>
            <p class="toggle-text">Already have an account? <span id="to-login">Log In</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPPRKWgwTrCdPnwzx-omOT0b6SKqOSBfg",
            authDomain: "nfsmec-bd2f4.firebaseapp.com",
            projectId: "nfsmec-bd2f4",
            storageBucket: "nfsmec-bd2f4.appspot.com",
            messagingSenderId: "367332219757",
            appId: "1:367332219757:web:7573f75cb79da15779ecae",
            measurementId: "G-99NLZ9N6Z7",
            databaseURL: "https://nfsmec-bd2f4-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global State: Redirect logged in users immediately
        onAuthStateChanged(auth, (user) => {
            if (user) {
                res.redirect('/home/web');
            }
        });

        // Toggle UI logic
        const loginBox = document.getElementById('login-box');
        const signupBox = document.getElementById('signup-box');
        
        document.getElementById('to-signup').addEventListener('click', () => {
            loginBox.classList.add('hidden');
            signupBox.classList.remove('hidden');
        });

        document.getElementById('to-login').addEventListener('click', () => {
            signupBox.classList.add('hidden');
            loginBox.classList.remove('hidden');
        });

        // Registration Event Handler
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorDiv = document.getElementById('signup-error');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Setup default placeholder profile avatar
                await updateProfile(user, {
                    displayName: name,
                    photoURL: "https://api.dicebear.com/7.x/adventurer/svg?seed=" + name
                });

                // Write primary data block to Realtime Database
                await set(ref(db, 'users/' + user.uid), {
                    username: name,
                    email: email,
                    role: "Athlete"
                });

            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.style.display = "block";
            }
        });

        // Authentication Login Handler
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorDiv.innerText = "Invalid credentials. Please try again.";
                errorDiv.style.display = "block";
            }
        });
    </script>
</body>
</html>
