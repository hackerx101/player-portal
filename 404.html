<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Out of Bounds</title>
    <style>
        :root {
            --primary: #ff4500; /* Sporty Orange */
            --bg: #0f172a;      /* Deep Navy */
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { max-width: 500px; padding: 2rem; }
        .icon { font-size: 5rem; margin-bottom: 1rem; }
        h1 { font-size: 4rem; color: var(--primary); margin: 0; }
        p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }
        .search-box {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚽️↪️🏀</div>
        <h1>Oops the ball landed on the wrong page</h1>
        <p><strong>Whistle blown!</strong> You've wandered out of bounds. The page you're looking for isn't on the pitch.</p>
        <a href="index.html" class="btn">Return to Pitch</a>
      
    </div>
</body>
</html>
